services:
  # ---------------------------------------------------------------------------
  # postgres — PostgreSQL 16 alpine con volumen persistente
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: notionlocal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notionlocal
      POSTGRES_PASSWORD: dark
      POSTGRES_DB: notionlocal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notionlocal -d notionlocal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # nextjs — aplicación Next.js en modo desarrollo (hot-reload)
  # ---------------------------------------------------------------------------
  nextjs:
    image: node:20-alpine
    container_name: notionlocal_app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://notionlocal:dark@postgres:5432/notionlocal
      NODE_ENV: development
    command: sh -c "apk add --no-cache openssl && npm install --legacy-peer-deps && npx prisma db push && npx tsx prisma/seed.ts && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
